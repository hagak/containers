---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Scheduled Release

concurrency:
  group: container-release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      appsToBuild:
        description: App(s) to build
        required: false
        type: string
        default: all
      force:
        description: Force rebuild
        type: boolean
        default: false
        required: true
  schedule:
    - cron: "0 * * * *"

jobs:
  simple-checks:
    name: Simple Checks
    uses: hagak/containers/.github/workflows/simple-checks.yaml@6741e4f5e0b7fb29cc983dc7c7c223a4a79d43ce # main

  build-images:
    name: Build Images
    needs: simple-checks
    uses: hagak/containers/.github/workflows/build-images.yaml@6741e4f5e0b7fb29cc983dc7c7c223a4a79d43ce # main
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      appsToBuild: ${{ inputs.appsToBuild }}
      force: ${{ inputs.force == true }}
      pushImages: true
      sendNotifications: true

  render-readme:
    name: Render Readme
    needs: build-images
    uses: ./.github/workflows/render-readme.yaml
    secrets: inherit
